name: Collecte Poly

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [collecte-manuelle]

permissions:
  contents: write 

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install requests pandas

      - name: Lancer la collecte
        run: python Collecte_Poly.py

      - name: Commit et push du CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add lfpb_live.csv
          git commit -m "Collecte automatique" || echo "Rien à commit"
          git push
