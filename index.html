<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Météo LFPB - Choisir un jour</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card-hover: #28384f;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
  }
  header {
    max-width: 900px;
    margin: 0 auto 32px auto;
    text-align: center;
  }
  h1 {
    font-size: 1.8rem;
    margin: 0 0 4px 0;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
  }
  .grid {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 20px;
  }
  a.day-box {
    text-decoration: none;
    color: inherit;
  }
  .day-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .day-box:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-3px);
  }
  .day-box .icon {
    font-size: 2rem;
  }
  .day-box .value {
    font-size: 1.3rem;
    font-weight: 700;
  }
  .day-box .label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  @media (max-width: 600px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(3, 1fr);
    }
  }
</style>
</head>
<body>

<header>
  <h1>🌤️ Météo Paris Le Bourget (LFPB)</h1>
  <div class="subtitle">Choisis un jour pour voir le détail</div>
</header>

<div class="grid" id="day-grid"></div>

<script>
  const jours = ["Jour 1", "Jour 2", "Jour 3", "Jour 4", "Jour 5", "Jour 6"];
  const gridEl = document.getElementById("day-grid");

  gridEl.innerHTML = jours.map((label, i) => `
    <a class="day-box" href="index.html?day=${i + 1}">
      <div class="icon">☁️</div>
      <div class="value">${label}</div>
      <div class="label">Voir le détail</div>
    </a>
  `).join("");
</script>

</body>
</html>
